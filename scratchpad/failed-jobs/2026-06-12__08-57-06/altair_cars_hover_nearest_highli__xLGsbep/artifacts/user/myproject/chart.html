<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    #vis.vega-embed {
      width: 100%;
      display: flex;
    }

    #vis.vega-embed details,
    #vis.vega-embed details summary {
      position: relative;
    }
  </style>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega@6"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-lite@6.4.1"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-embed@7"></script>
</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300}}, "layer": [{"mark": {"type": "point"}, "encoding": {"color": {"condition": {"param": "param_36215ebccab4b940", "empty": false, "field": "Origin", "type": "nominal"}, "value": "lightgray"}, "x": {"field": "Horsepower", "scale": {"zero": false}, "type": "quantitative"}, "y": {"field": "Miles_per_Gallon", "scale": {"zero": false}, "type": "quantitative"}}, "name": "view_fb16c0b95aed227b_0"}, {"mark": {"type": "text", "dy": -10}, "encoding": {"opacity": {"condition": {"param": "param_36215ebccab4b940", "value": 1, "empty": false}, "value": 0}, "text": {"field": "Name", "type": "nominal"}, "x": {"field": "Horsepower", "scale": {"zero": false}, "type": "quantitative"}, "y": {"field": "Miles_per_Gallon", "scale": {"zero": false}, "type": "quantitative"}}}], "data": {"url": "https://cdn.jsdelivr.net/npm/vega-datasets@v1.29.0/data/cars.json"}, "height": 400, "params": [{"name": "param_36215ebccab4b940", "select": {"type": "point", "nearest": true, "on": "pointerover"}, "views": ["view_fb16c0b95aed227b_0"]}], "width": 600, "$schema": "https://vega.github.io/schema/vega-lite/v6.4.1.json"};
      var embedOpt = {"mode": "vega-lite"};

      function showError(el, error){
          el.innerHTML = ('<div style="color:red;">'
                          + '<p>JavaScript Error: ' + error.message + '</p>'
                          + "<p>This usually means there's a typo in your chart specification. "
                          + "See the javascript console for the full traceback.</p>"
                          + '</div>');
          throw error;
      }
      const el = document.getElementById('vis');
      vegaEmbed("#vis", spec, embedOpt)
        .catch(error => showError(el, error));
    })(vegaEmbed);

  </script>
</body>
</html>
