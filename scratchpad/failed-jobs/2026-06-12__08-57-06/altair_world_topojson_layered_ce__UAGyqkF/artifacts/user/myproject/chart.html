<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    #vis.vega-embed {
      width: 100%;
      display: flex;
    }

    #vis.vega-embed details,
    #vis.vega-embed details summary {
      position: relative;
    }
  </style>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega@6"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-lite@6.4.1"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-embed@7"></script>
</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300}}, "layer": [{"data": {"url": "https://cdn.jsdelivr.net/npm/vega-datasets@v1.29.0/data/world-110m.json", "format": {"feature": "countries", "type": "topojson"}}, "mark": {"type": "geoshape", "fill": "#e8e8e8", "stroke": "white"}, "projection": {"type": "naturalEarth1"}}, {"data": {"name": "data-b7d04de476ffdafad9e171786803261e"}, "mark": {"type": "circle", "color": "red", "size": 80}, "encoding": {"latitude": {"field": "lat", "type": "quantitative"}, "longitude": {"field": "lon", "type": "quantitative"}}}, {"data": {"name": "data-b7d04de476ffdafad9e171786803261e"}, "mark": {"type": "text", "dy": -12}, "encoding": {"latitude": {"field": "lat", "type": "quantitative"}, "longitude": {"field": "lon", "type": "quantitative"}, "text": {"field": "city", "type": "nominal"}}}], "height": 500, "projection": {"type": "naturalEarth1"}, "width": 800, "$schema": "https://vega.github.io/schema/vega-lite/v6.4.1.json", "datasets": {"data-b7d04de476ffdafad9e171786803261e": [{"city": "Tokyo", "lat": 35.6762, "lon": 139.6503}, {"city": "London", "lat": 51.5074, "lon": -0.1278}, {"city": "New York", "lat": 40.7128, "lon": -74.006}, {"city": "Sao Paulo", "lat": -23.5505, "lon": -46.6333}, {"city": "Sydney", "lat": -33.8688, "lon": 151.2093}]}};
      var embedOpt = {"mode": "vega-lite"};

      function showError(el, error){
          el.innerHTML = ('<div style="color:red;">'
                          + '<p>JavaScript Error: ' + error.message + '</p>'
                          + "<p>This usually means there's a typo in your chart specification. "
                          + "See the javascript console for the full traceback.</p>"
                          + '</div>');
          throw error;
      }
      const el = document.getElementById('vis');
      vegaEmbed("#vis", spec, embedOpt)
        .catch(error => showError(el, error));
    })(vegaEmbed);

  </script>
</body>
</html>
