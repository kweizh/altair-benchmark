<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    #vis.vega-embed {
      width: 100%;
      display: flex;
    }

    #vis.vega-embed details,
    #vis.vega-embed details summary {
      position: relative;
    }
  </style>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega@6"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-lite@6.4.1"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-embed@7"></script>
</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300}}, "layer": [{"data": {"url": "https://cdn.jsdelivr.net/npm/vega-datasets@v1.29.0/data/iowa-electricity.csv", "format": {"type": "csv"}}, "mark": {"type": "errorband", "extent": "iqr", "interpolate": "monotone"}, "encoding": {"x": {"field": "year", "scale": {"type": "time"}, "timeUnit": "year", "title": "Year", "type": "temporal"}, "y": {"field": "net_generation", "title": "Net Generation (MWh)", "type": "quantitative"}}}, {"data": {"url": "https://cdn.jsdelivr.net/npm/vega-datasets@v1.29.0/data/iowa-electricity.csv", "format": {"type": "csv"}}, "mark": {"type": "line", "color": "steelblue", "strokeWidth": 2}, "encoding": {"x": {"field": "year", "scale": {"type": "time"}, "timeUnit": "year", "title": "Year", "type": "temporal"}, "y": {"aggregate": "median", "field": "net_generation", "type": "quantitative"}}}, {"data": {"name": "empty"}, "mark": {"type": "rule", "color": "red", "strokeDash": [4, 4], "strokeWidth": 1.5}, "encoding": {"y": {"datum": 0}}}, {"data": {"url": "https://cdn.jsdelivr.net/npm/vega-datasets@v1.29.0/data/iowa-electricity.csv", "format": {"type": "csv"}}, "mark": {"type": "text", "align": "left", "color": "darkblue", "dx": 6, "dy": -10, "fontSize": 12, "fontWeight": "bold"}, "encoding": {"text": {"field": "median_gen", "format": ".0f", "type": "quantitative"}, "x": {"field": "year", "scale": {"type": "time"}, "timeUnit": "year", "type": "temporal"}, "y": {"field": "median_gen", "type": "quantitative"}}, "transform": [{"aggregate": [{"op": "median", "field": "net_generation", "as": "median_gen"}], "groupby": ["year"]}, {"window": [{"op": "rank", "field": "", "as": "rank"}], "sort": [{"field": "median_gen", "order": "descending"}]}, {"filter": "datum.rank === 1"}]}], "height": 400, "title": {"text": "Iowa Electricity Net Generation by Year", "anchor": "start", "fontSize": 18, "subtitle": "IQR band across source categories \u00b7 median line \u00b7 peak year annotated", "subtitleColor": "gray", "subtitleFontSize": 13}, "width": 720, "$schema": "https://vega.github.io/schema/vega-lite/v6.4.1.json", "datasets": {"empty": [{}]}};
      var embedOpt = {"mode": "vega-lite"};

      function showError(el, error){
          el.innerHTML = ('<div style="color:red;">'
                          + '<p>JavaScript Error: ' + error.message + '</p>'
                          + "<p>This usually means there's a typo in your chart specification. "
                          + "See the javascript console for the full traceback.</p>"
                          + '</div>');
          throw error;
      }
      const el = document.getElementById('vis');
      vegaEmbed("#vis", spec, embedOpt)
        .catch(error => showError(el, error));
    })(vegaEmbed);

  </script>
</body>
</html>
