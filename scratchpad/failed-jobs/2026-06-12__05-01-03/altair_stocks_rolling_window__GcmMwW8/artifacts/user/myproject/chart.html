<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    #vis.vega-embed {
      width: 100%;
      display: flex;
    }

    #vis.vega-embed details,
    #vis.vega-embed details summary {
      position: relative;
    }
  </style>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega@6"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-lite@6.4.1"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-embed@7"></script>
</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300}}, "layer": [{"mark": {"type": "line", "opacity": 0.25, "strokeWidth": 1}, "encoding": {"color": {"field": "symbol", "legend": {"title": "Symbol"}, "type": "nominal"}, "tooltip": [{"field": "date", "format": "%Y-%m-%d", "title": "Date", "type": "temporal"}, {"field": "symbol", "title": "Symbol", "type": "nominal"}, {"field": "price", "format": ".2f", "title": "Price", "type": "quantitative"}], "x": {"field": "date", "title": "Date", "type": "temporal"}, "y": {"field": "price", "title": "Price (USD)", "type": "quantitative"}}, "name": "view_84106e0a48bdb2c6_0"}, {"mark": {"type": "line", "strokeWidth": 2.5}, "encoding": {"color": {"field": "symbol", "legend": {"title": "Symbol"}, "type": "nominal"}, "tooltip": [{"field": "date", "format": "%Y-%m-%d", "title": "Date", "type": "temporal"}, {"field": "symbol", "title": "Symbol", "type": "nominal"}, {"field": "rolling_mean", "format": ".2f", "title": "30-day mean", "type": "quantitative"}], "x": {"field": "date", "type": "temporal"}, "y": {"field": "rolling_mean", "title": "Price (USD)", "type": "quantitative"}}, "transform": [{"window": [{"op": "mean", "field": "price", "as": "rolling_mean"}], "frame": [-15, 15], "groupby": ["symbol"], "sort": [{"field": "date", "order": "ascending"}]}]}, {"mark": {"type": "rule", "opacity": 0.8, "strokeDash": [6, 3], "strokeWidth": 1.5}, "encoding": {"color": {"field": "symbol", "legend": {"title": "Symbol"}, "type": "nominal"}, "tooltip": [{"field": "symbol", "title": "Symbol", "type": "nominal"}, {"field": "mean_price", "format": ".2f", "title": "All-time mean", "type": "quantitative"}], "y": {"field": "mean_price", "title": "All-time mean", "type": "quantitative"}}, "transform": [{"joinaggregate": [{"op": "mean", "field": "price", "as": "mean_price"}], "groupby": ["symbol"]}]}], "data": {"url": "https://cdn.jsdelivr.net/npm/vega-datasets@v1.29.0/data/stocks.csv", "format": {}}, "height": 450, "params": [{"name": "symbol_selection", "bind": {"input": "select", "options": ["MSFT", "AMZN", "IBM", "GOOG", "AAPL"], "name": "Symbol: "}, "value": "MSFT"}, {"name": "grid", "select": {"type": "interval", "encodings": ["x"]}, "bind": "scales", "views": ["view_84106e0a48bdb2c6_0"]}], "resolve": {"scale": {"color": "shared"}}, "title": "Multi-Company Stock Prices", "transform": [{"filter": "datum.symbol === symbol_selection"}], "width": 900, "$schema": "https://vega.github.io/schema/vega-lite/v6.4.1.json"};
      var embedOpt = {"mode": "vega-lite"};

      function showError(el, error){
          el.innerHTML = ('<div style="color:red;">'
                          + '<p>JavaScript Error: ' + error.message + '</p>'
                          + "<p>This usually means there's a typo in your chart specification. "
                          + "See the javascript console for the full traceback.</p>"
                          + '</div>');
          throw error;
      }
      const el = document.getElementById('vis');
      vegaEmbed("#vis", spec, embedOpt)
        .catch(error => showError(el, error));
    })(vegaEmbed);

  </script>
</body>
</html>
