<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    #vis.vega-embed {
      width: 100%;
      display: flex;
    }

    #vis.vega-embed details,
    #vis.vega-embed details summary {
      position: relative;
    }
  </style>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega@6"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-lite@6.4.1"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-embed@7"></script>
</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300}}, "layer": [{"mark": {"type": "line", "opacity": 0.3, "strokeWidth": 1}, "encoding": {"color": {"field": "symbol", "title": "Symbol", "type": "nominal"}, "x": {"field": "date", "title": "Date", "type": "temporal"}, "y": {"field": "price", "title": "Price", "type": "quantitative"}}, "name": "view_87d28abcf10a2469_0", "transform": [{"filter": "datum.symbol == symbol_selector"}]}, {"mark": {"type": "line", "strokeWidth": 3}, "encoding": {"color": {"field": "symbol", "type": "nominal"}, "x": {"field": "date", "type": "temporal"}, "y": {"field": "rolling_mean", "title": "Price", "type": "quantitative"}}, "transform": [{"filter": "datum.symbol == symbol_selector"}, {"window": [{"field": "price", "op": "mean", "as": "rolling_mean"}], "frame": [-15, 15], "groupby": ["symbol"]}]}, {"mark": {"type": "rule", "strokeDash": [5, 5]}, "encoding": {"color": {"field": "symbol", "title": "Symbol", "type": "nominal"}, "y": {"field": "alltime_mean", "title": "Price", "type": "quantitative"}}, "transform": [{"filter": "datum.symbol == symbol_selector"}, {"joinaggregate": [{"field": "price", "op": "mean", "as": "alltime_mean"}], "groupby": ["symbol"]}]}], "data": {"url": "https://cdn.jsdelivr.net/npm/vega-datasets@v1.29.0/data/stocks.csv"}, "params": [{"name": "symbol_selector", "bind": {"input": "select", "options": ["MSFT", "AMZN", "IBM", "GOOG", "AAPL"], "name": "Symbol: "}, "value": "MSFT"}, {"name": "param_db82be42624d4632", "select": {"type": "interval", "encodings": ["x"]}, "bind": "scales", "views": ["view_87d28abcf10a2469_0"]}], "title": "Multi-Company Stock Prices with Rolling Mean & All-Time Average", "$schema": "https://vega.github.io/schema/vega-lite/v6.4.1.json"};
      var embedOpt = {"mode": "vega-lite"};

      function showError(el, error){
          el.innerHTML = ('<div style="color:red;">'
                          + '<p>JavaScript Error: ' + error.message + '</p>'
                          + "<p>This usually means there's a typo in your chart specification. "
                          + "See the javascript console for the full traceback.</p>"
                          + '</div>');
          throw error;
      }
      const el = document.getElementById('vis');
      vegaEmbed("#vis", spec, embedOpt)
        .catch(error => showError(el, error));
    })(vegaEmbed);

  </script>
</body>
</html>
