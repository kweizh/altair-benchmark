<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    #vis.vega-embed {
      width: 100%;
      display: flex;
    }

    #vis.vega-embed details,
    #vis.vega-embed details summary {
      position: relative;
    }
  </style>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega@6"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-lite@6.4.1"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-embed@7"></script>
</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300}}, "vconcat": [{"hconcat": [{"mark": {"type": "point"}, "encoding": {"color": {"field": "Origin", "type": "nominal"}, "opacity": {"condition": {"param": "origin_select", "value": 1}, "value": 0.15}, "x": {"field": "Horsepower", "type": "quantitative"}, "y": {"field": "Miles_per_Gallon", "type": "quantitative"}}, "name": "view_cecac4397f64a0f7_0"}, {"mark": {"type": "bar"}, "encoding": {"color": {"field": "Origin", "type": "nominal"}, "opacity": {"condition": {"param": "origin_select", "value": 1}, "value": 0.15}, "x": {"field": "Cylinders", "type": "ordinal"}, "y": {"aggregate": "count", "type": "quantitative"}}, "name": "view_c52c1de70cd1abd9_1"}]}, {"mark": {"type": "bar"}, "encoding": {"color": {"field": "Origin", "type": "nominal"}, "opacity": {"condition": {"param": "origin_select", "value": 1}, "value": 0.15}, "x": {"bin": true, "field": "Acceleration", "type": "quantitative"}, "y": {"aggregate": "count", "type": "quantitative"}}, "name": "view_72e1c083c9525c3e_1"}], "data": {"url": "https://cdn.jsdelivr.net/npm/vega-datasets@v1.29.0/data/cars.json"}, "params": [{"name": "origin_select", "select": {"type": "point", "fields": ["Origin"]}, "bind": "legend", "views": ["view_cecac4397f64a0f7_0", "view_c52c1de70cd1abd9_1", "view_72e1c083c9525c3e_1"]}], "$schema": "https://vega.github.io/schema/vega-lite/v6.4.1.json"};
      var embedOpt = {"mode": "vega-lite"};

      function showError(el, error){
          el.innerHTML = ('<div style="color:red;">'
                          + '<p>JavaScript Error: ' + error.message + '</p>'
                          + "<p>This usually means there's a typo in your chart specification. "
                          + "See the javascript console for the full traceback.</p>"
                          + '</div>');
          throw error;
      }
      const el = document.getElementById('vis');
      vegaEmbed("#vis", spec, embedOpt)
        .catch(error => showError(el, error));
    })(vegaEmbed);

  </script>
</body>
</html>
