<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    #vis.vega-embed {
      width: 100%;
      display: flex;
    }

    #vis.vega-embed details,
    #vis.vega-embed details summary {
      position: relative;
    }
  </style>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega@6"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-lite@6.4.1"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-embed@7"></script>
</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300}}, "layer": [{"data": {"url": "https://cdn.jsdelivr.net/npm/vega-datasets@v1.29.0/data/iowa-electricity.csv"}, "mark": {"type": "errorband", "extent": "iqr", "interpolate": "monotone"}, "encoding": {"x": {"field": "year", "scale": {"type": "time"}, "timeUnit": "year", "title": "Year", "type": "temporal"}, "y": {"field": "net_generation", "title": "Net Generation", "type": "quantitative"}}}, {"data": {"url": "https://cdn.jsdelivr.net/npm/vega-datasets@v1.29.0/data/iowa-electricity.csv"}, "mark": {"type": "line"}, "encoding": {"x": {"field": "year", "scale": {"type": "time"}, "timeUnit": "year", "title": "Year", "type": "temporal"}, "y": {"aggregate": "median", "field": "net_generation", "type": "quantitative"}}}, {"data": {"name": "empty"}, "mark": {"type": "rule", "color": "red", "strokeDash": [4, 4]}, "encoding": {"y": {"datum": 0}}}, {"data": {"url": "https://cdn.jsdelivr.net/npm/vega-datasets@v1.29.0/data/iowa-electricity.csv"}, "mark": {"type": "text", "align": "left", "baseline": "bottom", "dx": 5, "dy": -5, "fontSize": 12}, "encoding": {"text": {"field": "label", "type": "nominal"}, "x": {"field": "year", "scale": {"type": "time"}, "timeUnit": "year", "type": "temporal"}, "y": {"field": "median_gen", "type": "quantitative"}}, "transform": [{"aggregate": [{"op": "median", "field": "net_generation", "as": "median_gen"}], "groupby": ["year(year)"]}, {"window": [{"op": "rank", "field": "", "as": "rank"}], "sort": [{"field": "median_gen", "order": "descending"}]}, {"filter": "(datum.rank === 1)"}, {"calculate": "year(datum['year(year)']) + ': ' + format(datum['median_gen'], ',.1f')", "as": "label"}]}], "height": 400, "title": {"text": "Iowa Electricity Net Generation", "subtitle": "Yearly distribution across source categories with median trend"}, "width": 700, "$schema": "https://vega.github.io/schema/vega-lite/v6.4.1.json", "datasets": {"empty": [{}]}};
      var embedOpt = {"mode": "vega-lite"};

      function showError(el, error){
          el.innerHTML = ('<div style="color:red;">'
                          + '<p>JavaScript Error: ' + error.message + '</p>'
                          + "<p>This usually means there's a typo in your chart specification. "
                          + "See the javascript console for the full traceback.</p>"
                          + '</div>');
          throw error;
      }
      const el = document.getElementById('vis');
      vegaEmbed("#vis", spec, embedOpt)
        .catch(error => showError(el, error));
    })(vegaEmbed);

  </script>
</body>
</html>
