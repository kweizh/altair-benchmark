<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    #vis.vega-embed {
      width: 100%;
      display: flex;
    }

    #vis.vega-embed details,
    #vis.vega-embed details summary {
      position: relative;
    }
  </style>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega@6"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-lite@6.4.1"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-embed@7"></script>
</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300}}, "layer": [{"mark": {"type": "line", "opacity": 0.3, "strokeWidth": 1}, "encoding": {"color": {"field": "symbol", "type": "nominal"}, "x": {"field": "date", "type": "temporal"}, "y": {"field": "price", "type": "quantitative"}}, "name": "view_8ab8e3bc53f4800a_0", "transform": [{"filter": {"param": "symbol_filter"}}]}, {"mark": {"type": "line", "strokeWidth": 3}, "encoding": {"color": {"field": "symbol", "type": "nominal"}, "x": {"field": "date", "type": "temporal"}, "y": {"field": "rolling_mean", "type": "quantitative"}}, "transform": [{"filter": {"param": "symbol_filter"}}, {"window": [{"op": "mean", "field": "price", "as": "rolling_mean"}], "frame": [-15, 15], "groupby": ["symbol"]}]}, {"mark": {"type": "rule", "strokeDash": [5, 5]}, "encoding": {"color": {"field": "symbol", "type": "nominal"}, "y": {"field": "mean_price", "type": "quantitative"}}, "transform": [{"filter": {"param": "symbol_filter"}}, {"joinaggregate": [{"op": "mean", "field": "price", "as": "mean_price"}], "groupby": ["symbol"]}]}], "data": {"url": "https://cdn.jsdelivr.net/npm/vega-datasets@v1.29.0/data/stocks.csv"}, "params": [{"name": "symbol_filter", "select": {"type": "point", "fields": ["symbol"]}, "bind": {"input": "select", "options": ["MSFT", "AMZN", "IBM", "GOOG", "AAPL"], "name": "Symbol: "}, "views": ["view_8ab8e3bc53f4800a_0"]}, {"name": "param_f268f798f41c853e", "select": {"type": "interval"}, "bind": "scales", "views": ["view_8ab8e3bc53f4800a_0"]}], "$schema": "https://vega.github.io/schema/vega-lite/v6.4.1.json"};
      var embedOpt = {"mode": "vega-lite"};

      function showError(el, error){
          el.innerHTML = ('<div style="color:red;">'
                          + '<p>JavaScript Error: ' + error.message + '</p>'
                          + "<p>This usually means there's a typo in your chart specification. "
                          + "See the javascript console for the full traceback.</p>"
                          + '</div>');
          throw error;
      }
      const el = document.getElementById('vis');
      vegaEmbed("#vis", spec, embedOpt)
        .catch(error => showError(el, error));
    })(vegaEmbed);

  </script>
</body>
</html>
